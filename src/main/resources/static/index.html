<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Manajemen Data KTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="container mt-5">

<h2 class="mb-4">Sistem Manajemen KTP</h2>

<div id="alertMessage" class="alert d-none" role="alert"></div>

<div class="card mb-4">
    <div class="card-body">
        <form id="ktpForm">
            <input type="hidden" id="ktpId">
            <div class="mb-3">
                <label>Nomor KTP</label>
                <input type="text" id="nomorKtp" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Nama Lengkap</label>
                <input type="text" id="namaLengkap" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Alamat</label>
                <input type="text" id="alamat" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Tanggal Lahir</label>
                <input type="date" id="tanggalLahir" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Jenis Kelamin</label>
                <select id="jenisKelamin" class="form-control" required>
                    <option value="">Pilih Jenis Kelamin</option>
                    <option value="Laki-laki">Laki-laki</option>
                    <option value="Perempuan">Perempuan</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" id="btnSave">Simpan</button>
            <button type="button" class="btn btn-secondary d-none" id="btnCancel">Batal Edit</button>
        </form>
    </div>
</div>

<table class="table table-bordered">
    <thead>
    <tr>
        <th>No KTP</th>
        <th>Nama Lengkap</th>
        <th>Alamat</th>
        <th>Tgl Lahir</th>
        <th>Gender</th>
        <th>Aksi</th>
    </tr>
    </thead>
    <tbody id="ktpTableBody">
    </tbody>
</table>

<script>
    const API_URL = "http://localhost:8080/ktp";

    $(document).ready(function() {
        loadData();

        // Handle Submit Form (POST / PUT)
        $('#ktpForm').submit(function(e) {
            e.preventDefault();

            const id = $('#ktpId').val();
            const data = {
                nomorKtp: $('#nomorKtp').val(),
                namaLengkap: $('#namaLengkap').val(),
                alamat: $('#alamat').val(),
                tanggalLahir: $('#tanggalLahir').val(),
                jenisKelamin: $('#jenisKelamin').val()
            };

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            $.ajax({
                url: url,
                type: method,
                contentType: 'application/json',
                data: JSON.stringify(data),
                success: function(response) {
                    showAlert('Data berhasil disimpan!', 'success');
                    resetForm();
                    loadData();
                },
                error: function(xhr) {
                    showAlert(xhr.responseText || 'Terjadi kesalahan!', 'danger');
                }
            });
        });

        // Handle Tombol Batal Edit
        $('#btnCancel').click(function() {
            resetForm();
        });
    });

    // GET: Ambil Data
    function loadData() {
        $.ajax({
            url: API_URL,
            type: 'GET',
            success: function(data) {
                let rows = '';
                data.forEach(ktp => {
                    rows += `
                        <tr>
                            <td>${ktp.nomorKtp}</td>
                            <td>${ktp.namaLengkap}</td>
                            <td>${ktp.alamat}</td>
                            <td>${ktp.tanggalLahir}</td>
                            <td>${ktp.jenisKelamin}</td>
                            <td>
                                <button class="btn btn-warning btn-sm" onclick="editData(${ktp.id})">Edit</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteData(${ktp.id})">Hapus</button>
                            </td>
                        </tr>
                    `;
                });
                $('#ktpTableBody').html(rows);
            }
        });
    }

    // GET by ID untuk Edit (Memasukkan data ke form)
    function editData(id) {
        $.ajax({
            url: `${API_URL}/${id}`,
            type: 'GET',
            success: function(ktp) {
                $('#ktpId').val(ktp.id);
                $('#nomorKtp').val(ktp.nomorKtp);
                $('#namaLengkap').val(ktp.namaLengkap);
                $('#alamat').val(ktp.alamat);
                $('#tanggalLahir').val(ktp.tanggalLahir);
                $('#jenisKelamin').val(ktp.jenisKelamin);

                $('#btnSave').text('Update');
                $('#btnCancel').removeClass('d-none');
            }
        });
    }

    // DELETE: Hapus Data
    function deleteData(id) {
        if (confirm('Yakin ingin menghapus data ini?')) {
            $.ajax({
                url: `${API_URL}/${id}`,
                type: 'DELETE',
                success: function() {
                    showAlert('Data berhasil dihapus!', 'success');
                    loadData();
                },
                error: function(xhr) {
                    showAlert(xhr.responseText || 'Gagal menghapus data!', 'danger');
                }
            });
        }
    }

    // Fungsi Utilities
    function resetForm() {
        $('#ktpId').val('');
        $('#ktpForm')[0].reset();
        $('#btnSave').text('Simpan');
        $('#btnCancel').addClass('d-none');
    }

    function showAlert(message, type) {
        const alertBox = $('#alertMessage');
        alertBox.removeClass('d-none alert-success alert-danger')
                .addClass(`alert-${type}`)
                .text(message);

        setTimeout(() => alertBox.addClass('d-none'), 3000); // Hilang dalam 3 detik
    }
</script>
</body>
</html>
